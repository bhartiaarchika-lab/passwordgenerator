<!DOCTYPE html>
<html>
<head>
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>Password Generator</h2>
    <input type="text"  id="password" readonly>
    <br><br>
    Password Length:
    <input type="number" id="length" value="8" min="4" max="20">
    <br><br>
    <input type="checkbox" id="upper"> Uppercase
    <br>
    <input type="checkbox" id="lower"> Lowercase
    <br>
    <input type="checkbox" id="number"> Numbers
    <br>
    <input type="checkbox" id="symbol"> Symbols
    <br><br>
    <button onclick="generatePassword()">
        Generate Password
    </button>
</div>
<script src="script.js"></script>
</body>
</html>
